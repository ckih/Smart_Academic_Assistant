repository:
  name: Smart_Academic_Assistant
  description: A monorepo for the Smart Academic Assistant, featuring a FastAPI backend and a Next.js frontend.
  default_branch: main
  has_issues: true
  has_projects: true
  has_wiki: true

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - validate-repository
      enforce_admins: true
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
